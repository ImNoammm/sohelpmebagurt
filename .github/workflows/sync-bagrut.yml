name: Sync Bagrut Exams

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00
  workflow_dispatch:       # Manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Python dependencies
        run: pip3 install requests --break-system-packages

      - name: Run sync script
        run: python3 scripts/sync_bagrut.py

      - name: Commit and push new files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "bagrut-sync@sohelpmebagurt"
          git config user.name "Bagrut Sync Bot"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/ImNoammm/sohelpmebagurt.git
          git add subject/ComputerScience/java/skill.md subject/ComputerScience/csharp/skill.md || true
          if git diff --staged --quiet; then
            echo "Nothing new to commit."
          else
            git commit -m "Auto-sync: new bagrut exams from misrad hahinuch"
            git push
          fi
